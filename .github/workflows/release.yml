# **what?**
# Publishes the package to PyPI when a new tag is pushed.
# Also creates a GitHub Release with release notes.

# **why?**
# Automate the release process for dbt-maxcompute.

# **when?**
# This will run when a tag matching 'v*' is pushed (e.g., v1.0.0, v1.0.0a1).

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for trusted publishing to PyPI

defaults:
  run:
    shell: bash

jobs:
  core-tests:
    name: Core Tests

    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --user --upgrade pip
          python -m pip install -r dev-requirements.txt
          python -m pip install -e .
          python -m pip --version
          dbt --version

      - name: Run core tests
        run: pytest tests/functional/test_core.py -v --tb=short
        env:
          DBT_TEST_USER_1: RAM$mc_schema@test.aliyunid.com:test_user_2507
          DBT_TEST_USER_2: RAM$mc_schema@test.aliyunid.com:test_user_2507
          DBT_TEST_USER_3: RAM$mc_schema@test.aliyunid.com:test_user_2507

  build:
    name: Build distribution

    needs: core-tests

    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for version detection

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --user --upgrade pip
          python -m pip install --upgrade setuptools wheel build
          python -m pip --version

      - name: Build distributions
        run: python -m build

      - name: Show distributions
        run: ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          overwrite: true

  publish-pypi:
    name: Publish to PyPI

    needs: build

    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/dbt-maxcompute

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  create-github-release:
    name: Create GitHub Release

    needs: publish-pypi

    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
            echo "## Changes since ${PREV_TAG}" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %s (%h)" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
            echo "## Initial Release" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            git log --oneline --pretty=format:"- %s (%h)" | head -20 >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'a') || contains(steps.get_version.outputs.VERSION, 'b') || contains(steps.get_version.outputs.VERSION, 'rc') }}
          generate_release_notes: false
